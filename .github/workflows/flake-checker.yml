name: Flake checker

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "0 6 * * 1" # weekly on Monday
  workflow_dispatch:

jobs:
  flake-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check flake.lock health
        uses: DeterminateSystems/flake-checker-action@v12
        with:
          flake-lock-path: flake.lock
          fail-mode: false
